<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 转纯文本工具</title>
    <!-- 引入 Tailwind CSS 用于快速精美布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 marked.js 用于准确解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 自定义滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* Toast 动画 */
        .toast-enter {
            opacity: 1;
            transform: translateY(0);
        }
        .toast-leave {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-slate-800 min-h-screen flex flex-col font-sans selection:bg-blue-200">

    <!-- 顶部导航栏 -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-200/80 px-6 py-5 flex items-center justify-between sticky top-0 z-10">
        <div>
            <h1 class="text-2xl font-bold flex items-center gap-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Markdown 转纯文本
            </h1>
            <p class="text-base text-slate-500 mt-2">将 AI 输出的 Markdown 格式一键净化为纯文本，点击输出框即可自动复制。</p>
        </div>
    </header>

    <!-- 主体内容区 -->
    <main class="flex-1 p-4 md:p-8 w-full max-w-[1600px] mx-auto flex flex-col md:flex-row gap-8">
        
        <!-- 左侧：Markdown 输入 -->
        <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-md hover:shadow-lg transition-shadow duration-300 border border-slate-200/60 overflow-hidden relative">
            <div class="bg-slate-50 border-b border-slate-100 px-5 py-4 flex justify-between items-center">
                <span class="font-bold text-base text-slate-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    输入 Markdown
                </span>
                <button id="clearBtn" class="text-sm text-slate-500 hover:text-red-500 transition-colors px-3 py-1.5 rounded-lg hover:bg-slate-200">
                    清空
                </button>
            </div>
            <textarea id="mdInput" 
                class="flex-1 w-full p-5 text-base resize-none focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500 bg-transparent text-slate-700 leading-relaxed" 
                placeholder="在此粘贴包含 **加粗**、# 标题 或 代码块 的 Markdown 内容..."></textarea>
        </div>

        <!-- 右侧：纯文本输出 -->
        <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-md hover:shadow-lg transition-shadow duration-300 border border-slate-200/60 overflow-hidden relative group">
            <div class="bg-slate-50 border-b border-slate-100 px-5 py-4 flex justify-between items-center">
                <span class="font-bold text-base text-slate-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                    纯文本输出
                </span>
                <span class="text-sm text-blue-600 bg-blue-100 px-3 py-1 rounded-full animate-pulse md:group-hover:animate-none">
                    点击任意区域自动复制
                </span>
            </div>
            <!-- 增加了 overflow-y-auto 确保无论如何都能滚动，移除了阻挡滚动的 copyOverlay -->
            <textarea id="textOutput" readonly
                class="flex-1 w-full p-5 text-base resize-none focus:outline-none bg-slate-50/30 text-slate-800 leading-relaxed cursor-pointer overflow-y-auto" 
                placeholder="这里将实时显示转换后的纯文本内容..."></textarea>
        </div>

    </main>

    <!-- 复制成功的提示 Toast -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 transition-all duration-300 toast-leave z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span class="font-medium text-base">已自动复制到剪贴板！</span>
    </div>

    <!-- 转换与复制逻辑 -->
    <script>
        const mdInput = document.getElementById('mdInput');
        const textOutput = document.getElementById('textOutput');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');
        
        let toastTimeout;

        // 核心转换函数
        function convertToPlainText() {
            const markdownText = mdInput.value;
            
            if (!markdownText.trim()) {
                textOutput.value = '';
                return;
            }

            // 1. 使用 marked.js 将 Markdown 解析为 HTML
            const rawHtml = marked.parse(markdownText);
            
            // 2. 创建一个隐形 DOM 元素来容纳 HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = rawHtml;
            
            // 3. 使用 innerText 提取纯文本。
            // 优点：innerText 能够根据浏览器的渲染规则，自动识别块级元素（p, div, li 等）并保留合适的换行符。
            let plainText = tempDiv.innerText;
            
            // 4. 去除首尾多余空白
            textOutput.value = plainText.trim();
        }

        // 监听输入事件，实现实时转换
        mdInput.addEventListener('input', convertToPlainText);

        // 清空按钮
        clearBtn.addEventListener('click', () => {
            mdInput.value = '';
            convertToPlainText();
            mdInput.focus();
        });

        // 复制函数
        function copyToClipboard() {
            const textToCopy = textOutput.value;
            if (!textToCopy) return;

            // 现代剪贴板 API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(showToast).catch(fallbackCopy);
            } else {
                fallbackCopy();
            }
        }

        // 降级复制方案（针对部分不支持 clipboard API 的浏览器/环境）
        function fallbackCopy() {
            textOutput.select();
            textOutput.setSelectionRange(0, 99999); /* 兼容移动端 */
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('复制失败:', err);
                alert('自动复制失败，请长按手动复制。');
            }
            // 移除选中状态
            window.getSelection().removeAllRanges();
        }

        // 显示复制成功 Toast
        function showToast() {
            toast.classList.remove('toast-leave');
            toast.classList.add('toast-enter');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-leave');
            }, 2000); // 2秒后消失
        }

        // 绑定点击复制事件（移除了干扰滑动的 touchend，直接使用 click 兼容全端）
        textOutput.addEventListener('click', copyToClipboard);

        // 页面加载时初始化一次（防止浏览器缓存旧内容没有解析）
        convertToPlainText();
    </script>
</body>
</html>
